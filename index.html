<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - Dinámica</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
</head>
<body class="despejado"> <div class="card">
        <div class="search">
            <input type="text" placeholder="Escribe una ciudad..." spellcheck="false">
            <button id="search-btn">🔍</button>
        </div>

        <div class="weather">
            <img src="" class="weather-icon" alt="Icono del clima" style="width: 130px;">
            <h1 class="temp">22°C</h1>
            <h2 class="city">Madrid</h2>
            <p class="date"></p>
            
            <div class="details">
                <div class="col">
                    <p class="humidity">50%</p>
                    <p>Humedad</p>
                </div>
                <div class="col">
                    <p class="wind">15 km/h</p>
                    <p>Viento</p>
                </div>
            </div>
        </div>
    </div>

    <footer class="main-footer">
        <h3>javilindj - all right reserved</h3>
    </footer>

    <p></p>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <script src="script.js"></script>
</body>
</html>
